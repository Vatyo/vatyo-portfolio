<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <!-- Arrow box with gradient -->
  <rect x="0" y="8" width="44" height="44" rx="10" fill="none" stroke="#0891b2" stroke-width="2"/>
